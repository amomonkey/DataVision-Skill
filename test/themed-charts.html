/* ---- niceScale: force 5 grid lines, 0 floats with negatives (陷阱 3) ------ */
function niceScale(vals, splits) {
  splits = splits || 4;
  var flat = [];
  vals.forEach(function (v) { if (Array.isArray(v)) flat = flat.concat(v); else flat.push(v); });
  flat = flat.filter(function (v) { return typeof v === 'number' && isFinite(v); });
  if (!flat.length) return null;
  var lo = Math.min.apply(null, flat), hi = Math.max.apply(null, flat);
  if (lo > 0) lo = 0;
  if (hi < 0) hi = 0;
  var span = (hi - lo) || Math.abs(hi || 1);
  var nice = [1, 1.5, 2, 2.5, 3, 4, 5, 6, 7.5, 8, 10];
  var baseMag = Math.pow(10, Math.floor(Math.log10(span / splits)));
  for (var p = -2; p <= 2; p++) {
    var m = baseMag * Math.pow(10, p);
    for (var i = 0; i < nice.length; i++) {
      var step = nice[i] * m;
      if (step * splits < span - 1e-9) continue;
      var negSegs = lo < 0 ? Math.ceil(-lo / step - 1e-9) : 0;
      var posSegs = hi > 0 ? Math.ceil(hi / step - 1e-9) : 0;
      if (negSegs + posSegs > splits) continue;
      return { min: -negSegs * step, max: (splits - negSegs) * step, interval: step, negSegs: negSegs };
    }
  }
  return null;
}

/* ---- tooltip marker html — shape follows legend (陷阱 15) ----------------- */
function markerHtml(seriesType, color, force) {
  var shape = force || (seriesType === 'line' ? 'pill' : seriesType === 'bar' ? 'square' : 'dot');
  var s = 'display:inline-block;background:' + color + ';margin-right:6px;vertical-align:middle;';
  if (shape === 'pill')   return '<span style="' + s + 'width:8px;height:2px;border-radius:1px;"></span>';
  if (shape === 'square') return '<span style="' + s + 'width:6px;height:6px;border-radius:1px;"></span>';
  if (shape === 'circle') return '<span style="' + s + 'width:10px;height:10px;border-radius:50%;"></span>'; // Ainvest
  return '<span style="' + s + 'width:6px;height:6px;border-radius:50%;"></span>';                            // dot
}

/* ---- THS tooltip: 位置 C — fixed top, mirror left/right (tooltip.md) ------ */
function thsTooltip(getChart, unitOf) {
  return {
    trigger: 'axis',
    backgroundColor: '#3B3B3B',           // base, not overridden by THS
    borderWidth: 0,
    padding: 8,
    hideDelay: 2000,                       // base
    transitionDuration: 0,
    extraCssText: 'border-radius:4px;max-width:172px;box-shadow:0 2px 8px rgba(0,0,0,.2);',
    axisPointer: { type: 'line', z: 1, lineStyle: { type: 'solid', color: 'rgba(0,0,0,0.6)', width: 1 } },
    position: function (pt, params, dom, rect, size) {
      var chart = getChart();
      var W = chart.getWidth();
      var yOpt = chart.getOption().yAxis;
      var yMax = (Array.isArray(yOpt) ? yOpt[0] : yOpt).max;
      var gridTop = chart.convertToPixel({ gridIndex: 0 }, [0, yMax])[1];
      var tw = size.contentSize[0];
      var m = 8;
      var x = (pt[0] < W / 2) ? (W - tw - m) : m;   // 左半区→右侧 / 右半区→左侧
      return [x, Math.max(0, gridTop)];
    },
    formatter: function (params) {
      var html = '<div style="color:#fff;font-size:12px;margin-bottom:4px;font-family:' + FONT_CN + '">'
               + (params[0].axisValueLabel || params[0].axisValue) + '</div>';
      params.forEach(function (p) {
        var unit = unitOf ? (unitOf[p.seriesName] || '') : '';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;line-height:18px;">'
              +   '<span style="color:rgba(255,255,255,.84);font-size:12px;font-family:' + FONT_CN + '">'
              +      markerHtml(p.seriesType, p.color) + p.seriesName + '</span>'
              +   '<span style="margin-left:24px;color:rgba(255,255,255,.84);font-size:12px;font-family:' + FONT_NUM + ';font-weight:500">'
              +      p.value + '<span style="font-weight:700">' + unit + '</span></span>'
              + '</div>';
      });
      return html;
    }
  };
}

/* ---- Ainvest tooltip: 位置 B — anchored grid-top + 下三角 (陷阱 18) ------- */
function ainvestTooltip(getChart, unitOf) {
  var TRI = 6, GAP = 4;
  return {
    trigger: 'axis',
    backgroundColor: '#383838',
    borderWidth: 0,
    padding: [8, 10, 8, 10],
    hideDelay: 0,
    transitionDuration: 0,
    textStyle: { color: 'rgba(255,255,255,.84)', fontSize: 12, fontFamily: FONT_EN },
    extraCssText: 'border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.18);',
    axisPointer: { type: 'line', z: 1, lineStyle: { type: 'solid', color: 'rgba(0,0,0,0.6)', width: 1 } },
    position: function (pt, params, dom, rect, size) {
      var chart = getChart();
      var W = chart.getWidth();
      var yOpt = chart.getOption().yAxis;
      var yMax = (Array.isArray(yOpt) ? yOpt[0] : yOpt).max;
      var gridTop = chart.convertToPixel({ gridIndex: 0 }, [0, yMax])[1];
      var tw = size.contentSize[0], th = size.contentSize[1];
      var x = Math.max(0, Math.min(pt[0] - tw / 2, W - tw));   // 居中 + 边缘 clamp
      var y = Math.max(0, gridTop - th - TRI - GAP);           // 锚 grid 上沿外侧
      dom.dataset.arrowX = String(pt[0] - x);                  // 三角反向偏移
      return [x, y];
    },
    formatter: function (params) {
      var rows = params.map(function (p) {
        var unit = unitOf ? (unitOf[p.seriesName] || '') : '%';
        return '<div style="display:flex;justify-content:space-between;align-items:center;line-height:18px;">'
             +   '<span>' + markerHtml(p.seriesType, p.color, 'circle') + p.seriesName + '</span>'
             +   '<span style="margin-left:24px;font-weight:500">' + p.value + '<span style="font-weight:700">' + unit + '</span></span>'
             + '</div>';
      }).join('');
      return '<div style="position:relative">'
           +   '<div style="color:#fff;margin-bottom:4px">' + (params[0].axisValueLabel || params[0].axisValue) + '</div>'
           +   rows
           +   '<span class="av-tip-arrow" style="position:absolute;bottom:-' + TRI + 'px;left:0;width:0;height:0;'
           +     'border-left:6px solid transparent;border-right:6px solid transparent;border-top:' + TRI + 'px solid #383838;'
           +     'transform:translateX(-6px);"></span>'
           + '</div>';
    }
  };
}
function bindArrowSync(chart) {                                 // sync 三角 to cursor x (陷阱 18)
  chart.on('showTip', function () {
    requestAnimationFrame(function () {
      var arrow = chart.getDom().querySelector('.av-tip-arrow');
      if (!arrow) return;
      var tip = arrow.closest('div[style*="position: absolute"]');
      var ax = tip && tip.dataset ? tip.dataset.arrowX : null;
      if (ax != null) arrow.style.left = (Number(ax) - 6) + 'px';
    });
  });
}

/* ---- reusable axis fragments --------------------------------------------- */
function xAxisCategory(cats, font, showLine) {
  return {
    type: 'category', data: cats, boundaryGap: true,            // 形式 A inset, N≤5 ⇒ 10% (陷阱 19)
    axisLine: showLine ? { show: true, lineStyle: { color: '#808080', width: 0.5 } } : { show: false },
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: {
      color: TEXT_SECONDARY, fontSize: 10, fontFamily: font, fontWeight: 500,
      showMinLabel: true, showMaxLabel: true   // boundaryGap:true → 首尾标签居中、与数据对齐（不加 alignMin/Max，见 axes.md）
    }
  };
}
function yAxisValue(data, opts) {
  opts = opts || {};
  var sc = niceScale(data, 4);
  return {
    type: 'value', position: opts.position || 'left',
    min: sc.min, max: sc.max, interval: sc.interval, splitNumber: 4,
    name: opts.name, nameLocation: 'end', nameGap: 8,
    nameTextStyle: { color: TEXT_SECONDARY, fontSize: 10, fontFamily: opts.font, align: opts.position === 'right' ? 'right' : 'left' },
    axisLine: { show: false }, axisTick: { show: false },
    axisLabel: {
      inside: true, margin: 4, verticalAlign: 'bottom',         // 形式 A：标签在网格内部
      color: TEXT_SECONDARY, fontSize: 10, fontFamily: opts.font, fontWeight: 500,
      formatter: opts.labelFmt
    },
    splitLine: opts.splitLine === false ? { show: false }
             : { show: true, lineStyle: { color: opts.grid || GRID_BASE, width: 0.5 } }
  };
}
/* 形式 A 顶标签下挂 / 其余上顶：拆主轴 + 顶标签辅助轴 (陷阱 21) */
function insideYAxis(cfg) {
  var max = cfg.max;
  function make(isTop) {
    var ax = Object.assign({}, cfg);
    ax.axisLabel = Object.assign({}, cfg.axisLabel, {
      verticalAlign: isTop ? 'top' : 'bottom',                  // 顶标签下挂 / 其余上顶
      formatter: function (v) { var isMax = Math.abs(v - max) < 1e-6; return (isTop ? isMax : !isMax) ? v : ''; }
    });
    if (isTop) { ax.splitLine = { show: false }; ax.axisLine = { show: false }; ax.axisTick = { show: false }; ax.name = undefined; }
    return ax;
  }
  return [make(false), make(true)];                             // [主轴, 顶标签轴]
}
function zeroMarkLine() {                                       // 0 轴加深 (陷阱 9)
  return { silent: true, symbol: 'none', label: { show: false }, z: 1,
           data: [{ yAxis: 0 }], lineStyle: { color: ZERO_DEEP, width: 1, type: 'solid' } };
}
var PILL = 'path://M1,0 L7,0 A1,1 0 0 1 7,2 L1,2 A1,1 0 0 1 1,0 Z';  // 折线 legend 8×2 胶囊

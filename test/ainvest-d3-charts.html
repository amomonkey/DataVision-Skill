<style>
:root{
  /* Ainvest 序列 8 色色板（§1.1） */
  --c1:#265FFC; --c2:#38D1FF; --c3:#F564B9; --c4:#733ED6;
  --c5:#00DDCB; --c6:#273D8F; --c7:#FF7040; --c8:#9EA9C7;
  /* 折柱组合：柱 = 1..6，折线 = 7,8（§1.2） */

  /* 涨跌色 · Ainvest 海外口径（§1.7 桑基汇正/汇负） */
  --up:#00B53C;  --down:#FF381A;

  /* 字体 · 全图统一 font-family-en（§1.3） */
  --ff-en:"Plus Jakarta Sans", -apple-system, "Helvetica Neue", Arial, sans-serif;

  /* 文本 · base */
  --text-primary:rgba(0,0,0,0.84);
  --text-secondary:rgba(0,0,0,0.6);

  /* 网格 / 轴 · Ainvest 覆盖（§2.2） */
  --grid:rgba(0,0,0,0.10);
  --axisLine:#808080;
  --divider-deep:#858585;

  /* Tooltip · Ainvest（§1.6） */
  --tt-bg:#383838;

  /* 高亮胶囊 · Ainvest（§1.8） */
  --tag-bg:#000; --tag-fg:#fff;

  /* DataZoom · Ainvest（§1.13） */
  --dz-track:rgba(0,0,0,0.08);
  --dz-fill:rgba(0,0,0,0.6);
}

*{box-sizing:border-box;}
body{margin:0;padding:24px;background:#F4F5F7;font-family:var(--ff-en);color:var(--text-primary);}
header.page{display:flex;align-items:baseline;gap:16px;margin-bottom:16px;}
header.page h1{font-size:20px;font-weight:600;margin:0;}
header.page .meta{font-size:12px;color:var(--text-secondary);}

.legend-rule{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--text-secondary);margin-bottom:24px;}
.legend-rule span{display:inline-flex;align-items:center;gap:6px;}
.sw{width:10px;height:10px;border-radius:50%;display:inline-block;}

.row{
  background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:16px;
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
}
.row h2{font-size:14px;font-weight:600;margin:0 0 4px 0;color:var(--text-primary);}
.row .desc{font-size:11px;color:var(--text-secondary);margin-bottom:12px;}

.compare{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:24px;align-items:start;}
.col{position:relative;}
.col .col-label{
  font-size:10px;font-weight:600;letter-spacing:0.06em;
  color:var(--text-secondary);text-transform:uppercase;margin-bottom:6px;
}
.viewport{
  background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:6px;
  padding:12px 12px 16px 12px;position:relative;overflow:hidden;
}
.viewport.web{height:auto;}
.viewport.mobile{width:343px;}

/* SVG 通用 */
svg.chart{display:block;font-family:var(--ff-en);}
svg.chart text{font-family:var(--ff-en);}
svg.chart .axis-label{font-size:11px;fill:var(--text-secondary);font-weight:500;}
svg.chart.mobile .axis-label{font-size:10px;}
svg.chart .axis-line{stroke:var(--axisLine);stroke-width:0.5;}
svg.chart .grid-line{stroke:var(--grid);stroke-width:1;shape-rendering:crispEdges;}
svg.chart .zero-line{stroke:var(--divider-deep);stroke-width:1;shape-rendering:crispEdges;}
svg.chart .bar-label{font-size:10px;font-weight:500;fill:var(--text-secondary);}
svg.chart .data-label{font-size:10px;font-weight:500;fill:var(--text-primary);}
svg.chart .axis-tag rect{rx:4;ry:4;}
svg.chart .axis-tag text{font-size:10px;font-weight:600;fill:var(--tag-fg);}

/* Legend */
.lg{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;line-height:16px;color:var(--text-secondary);margin-bottom:8px;}
.lg .lg-item{display:inline-flex;align-items:center;gap:6px;}
.lg .lg-dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:0 none;}

/* Tooltip */
.tt{
  position:absolute;pointer-events:none;background:var(--tt-bg);color:#fff;
  font-family:var(--ff-en);font-size:12px;line-height:16px;
  padding:8px 10px;border-radius:4px;min-width:120px;
  transform:translate(-50%, calc(-100% - 10px));opacity:0;transition:opacity .08s;
  z-index:20;
}
.tt .tt-title{font-size:12px;opacity:.84;margin-bottom:4px;}
.tt .tt-row{display:flex;align-items:center;gap:8px;}
.tt .tt-row .nm{flex:1;opacity:.84;}
.tt .tt-row .vl{font-weight:600;}
.tt .tt-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.tt::after{
  content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);
  border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:6px solid var(--tt-bg);
}

/* DataZoom · Ainvest §1.13 */
.dz{position:relative;height:32px;margin-top:14px;}
.dz .track{position:absolute;left:0;right:0;top:14px;height:4px;background:var(--dz-track);border-radius:2px;}
.dz .fill{position:absolute;top:14px;height:4px;background:var(--dz-fill);border-radius:2px;}
.dz .handle{
  position:absolute;width:32px;height:32px;top:0;border-radius:50%;
  background:#fff;border:1px solid rgba(0,0,0,0.12);
  box-shadow:0 1px 4px rgba(0,0,0,0.12);
  cursor:ew-resize;display:flex;align-items:center;justify-content:center;
}
.dz .handle .grip{display:flex;flex-direction:column;gap:3px;}
.dz .handle .grip i{display:block;width:10px;height:1.5px;background:rgba(0,0,0,0.6);}

.watermark{position:absolute;left:14px;bottom:8px;opacity:1;pointer-events:none;}

/* small monospace data label for numbers */
.num{font-variant-numeric:tabular-nums;}
</style>
</head>

/* ========================================================================
   Tooltip
   ======================================================================== */
function attachTip(host){
  const tip = host.append("div").attr("class","tt");
  function show(html, x, y){
    tip.html(html).style("left", x+"px").style("top", y+"px").style("opacity",1);
  }
  function hide(){ tip.style("opacity",0); }
  return {show, hide, node:tip.node()};
}

/* ========================================================================
   Page Layout helpers
   ======================================================================== */
const app = d3.select("#app");

function row(id, title, desc){
  const root = app.append("section").attr("class","row").attr("id",id);
  root.append("h2").text(title);
  if(desc) root.append("div").attr("class","desc").text(desc);
  const cmp = root.append("div").attr("class","compare");
  const web = cmp.append("div").attr("class","col");
  web.append("div").attr("class","col-label").text("WEB · PC");
  const webView = web.append("div").attr("class","viewport web");
  const mob = cmp.append("div").attr("class","col");
  mob.append("div").attr("class","col-label").text("APP · Mobile");
  const mobView = mob.append("div").attr("class","viewport mobile");
  return {web:webView, mob:mobView};
}

/* 共用：watermark — Ainvest grid 左下角 */
function watermark(svgSel, x, y){
  svgSel.append("use")
    .attr("href","#ainvest-wm")
    .attr("x", x).attr("y", y)
    .attr("width", 96).attr("height", 20);
}

/* 共用：Legend HTML */
function legendDOM(host, items){
  const lg = host.append("div").attr("class","lg");
  items.forEach(it=>{
    const i = lg.append("span").attr("class","lg-item");
    i.append("i").attr("class","lg-dot").style("background", it.color);
    i.append("span").text(it.name);
  });
  return lg;
}

/* 共用：nice scale 5 段 */
function niceScale(vmin, vmax){
  if(vmin === vmax){ vmin -= 1; vmax += 1; }
  const span = vmax - vmin;
  const step0 = span / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(step0))));
  const norm = step0 / mag;
  let step;
  if(norm < 1.5) step = 1;
  else if(norm < 3) step = 2;
  else if(norm < 7.5) step = 5;
  else step = 10;
  step *= mag;
  const min = Math.floor(vmin / step) * step;
  const max = min + step * 4;
  return {min, max, step, ticks: d3.range(min, max+step/2, step)};
}

/* 共用：基础 SVG（含 axis/grid 区域） */
function buildSVG(host, w, h, isMobile){
  const svg = host.append("svg")
    .attr("class","chart"+(isMobile?" mobile":""))
    .attr("width", w).attr("height", h)
    .attr("viewBox", `0 0 ${w} ${h}`);
  return svg;
}

/* ---------- 1. Bar (单系列含负) ---------- */
function renderBar(host, isMobile){
  const W = isMobile ? 319 : 720, H = 240;
  const margin = {top:20, right:48, bottom:30, left:8};
  // Y 轴 Ainvest 右侧；mobile 形式 A（内侧），pc 形式 B（外侧 + 居中）
  const svg = buildSVG(host, W, H, isMobile);
  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;
  const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

  const x = d3.scaleBand().domain(D_BAR.map(d=>d.x)).range([0,innerW]).padding(0.42);
  const ext = d3.extent(D_BAR, d=>d.y);
  const ns = niceScale(Math.min(0,ext[0])*1.2, ext[1]*1.2);
  const y = d3.scaleLinear().domain([ns.min, ns.max]).range([innerH, 0]);

  // grid
  g.selectAll("line.grid-line").data(ns.ticks).enter().append("line")
    .attr("class", d=> d===0 ? "zero-line" : "grid-line")
    .attr("x1",0).attr("x2",innerW).attr("y1", d=>y(d)).attr("y2", d=>y(d));

  // bars
  const tip = attachTip(host);
  g.selectAll("rect.bar").data(D_BAR).enter().append("rect")
    .attr("class","bar")
    .attr("x", d=>x(d.x))
    .attr("width", Math.min(x.bandwidth(), 32))
    .attr("transform", d=>`translate(${(x.bandwidth()-Math.min(x.bandwidth(),32))/2},0)`)
    .attr("y", d=> d.y>=0 ? y(d.y) : y(0))
    .attr("height", d=> Math.abs(y(d.y) - y(0)))
    .attr("fill","#265FFC")
    .on("mousemove", function(ev,d){
      const [px,py] = d3.pointer(ev, host.node());
      tip.show(`<div class="tt-title">${d.x}</div><div class="tt-row"><span class="tt-dot" style="background:#265FFC"></span><span class="nm">营收</span><span class="vl num">${d.y}</span></div>`, px, py);
    })
    .on("mouseleave", tip.hide);

  // labels — Ainvest 固定二级灰
  g.selectAll("text.bar-label").data(D_BAR).enter().append("text")
    .attr("class","bar-label")
    .attr("x", d=> x(d.x) + x.bandwidth()/2)
    .attr("y", d=> d.y>=0 ? y(d.y) - 5 : y(d.y) + 12)
    .attr("text-anchor","middle")
    .attr("fill","rgba(0,0,0,0.6)")
    .text(d=> d.y);

  // Y 轴标签（右侧）
  const yAxisX = innerW + (isMobile? -4 : 8);
  g.selectAll("text.y-tick").data(ns.ticks).enter().append("text")
    .attr("class","axis-label")
    .attr("x", yAxisX)
    .attr("y", d=> y(d) + (isMobile? -2 : 4))
    .attr("text-anchor", isMobile ? "end" : "start")
    .text(d=> d);

  // X 轴标签（mobile 10 / pc 11）
  g.append("line").attr("class","axis-line").attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);
  g.selectAll("text.x-tick").data(D_BAR).enter().append("text")
    .attr("class","axis-label")
    .attr("x", d=> x(d.x) + x.bandwidth()/2)
    .attr("y", innerH + 16)
    .attr("text-anchor","middle")
    .text(d=> d.x);

  // 水印 — Ainvest 左下
  svg.append("use").attr("href","#ainvest-wm")
    .attr("x", margin.left).attr("y", H-26)
    .attr("width",96).attr("height",20);
}

/* ---------- 2. Grouped Bar ---------- */
function renderGroupedBar(host, isMobile){
  const W = isMobile ? 319 : 720, H = 260;
  const margin = {top:30, right:48, bottom:30, left:8};
  const svg = buildSVG(host, W, H, isMobile);
  const innerW = W - margin.left - margin.right, innerH = H - margin.top - margin.bottom;
  const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

  const series = ["AAPL","TSLA","NVDA"];
  const seriesColor = {AAPL:"#265FFC", TSLA:"#38D1FF", NVDA:"#F564B9"};
  const x0 = d3.scaleBand().domain(D_GBAR.map(d=>d.x)).range([0,innerW]).padding(0.3);
  // Ainvest §1.15 多柱组内单柱宽 = 66 / N
  const barW = Math.min(66 / series.length, x0.bandwidth() / series.length - 2);
  const gap  = 4;
  const x1 = (i)=> -((barW*series.length + gap*(series.length-1))/2) + i*(barW+gap);

  // legend
  const lgHost = host.insert("div", "svg").attr("class","lg");
  series.forEach(s=>{
    const it = lgHost.append("span").attr("class","lg-item");
    it.append("i").attr("class","lg-dot").style("background", seriesColor[s]);
    it.append("span").text(s);
  });

  // y
  const all = [];
  D_GBAR.forEach(d=> series.forEach(s=> all.push(d[s])));
  const ext = d3.extent(all); const ns = niceScale(Math.min(0,ext[0])*1.15, ext[1]*1.15);
  const y = d3.scaleLinear().domain([ns.min, ns.max]).range([innerH, 0]);

  g.selectAll("line.grid-line").data(ns.ticks).enter().append("line")
    .attr("class", d=> d===0?"zero-line":"grid-line")
    .attr("x1",0).attr("x2",innerW).attr("y1",d=>y(d)).attr("y2",d=>y(d));

  const tip = attachTip(host);

  const groups = g.selectAll("g.group").data(D_GBAR).enter()
    .append("g").attr("transform", d=> `translate(${x0(d.x)+x0.bandwidth()/2},0)`);
  series.forEach((s,i)=>{
    groups.append("rect")
      .attr("x", x1(i))
      .attr("width", barW)
      .attr("y", d=> d[s]>=0 ? y(d[s]) : y(0))
      .attr("height", d=> Math.abs(y(d[s]) - y(0)))
      .attr("fill", seriesColor[s])
      .on("mousemove", function(ev,d){
        const [px,py] = d3.pointer(ev, host.node());
        tip.show(`<div class="tt-title">${d.x}</div><div class="tt-row"><span class="tt-dot" style="background:${seriesColor[s]}"></span><span class="nm">${s}</span><span class="vl num">${d[s]}</span></div>`, px, py);
      })
      .on("mouseleave", tip.hide);
  });

  // y label
  g.selectAll("text.y-tick").data(ns.ticks).enter().append("text")
    .attr("class","axis-label")
    .attr("x", innerW + (isMobile? -4: 8))
    .attr("y", d=> y(d)+(isMobile? -2: 4))
    .attr("text-anchor", isMobile?"end":"start")
    .text(d=> d);

  // x label
  g.append("line").attr("class","axis-line").attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);
  g.selectAll("text.x-tick").data(D_GBAR).enter().append("text")
    .attr("class","axis-label")
    .attr("x", d=> x0(d.x)+x0.bandwidth()/2).attr("y", innerH+16)
    .attr("text-anchor","middle").text(d=>d.x);

  watermark(svg, margin.left, H-26);
}

/* ---------- 3. Bar + Line Combo (DataZoom + 负值) ---------- */
function renderCombo(host, isMobile){
  const W = isMobile ? 319 : 720, H = 270;
  const margin = {top:30, right:50, bottom:30, left:isMobile?8:48};
  const svg = buildSVG(host, W, H, isMobile);
  const innerW = W - margin.left - margin.right, innerH = H - margin.top - margin.bottom;
  const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

  // legend
  const lgHost = host.insert("div","svg").attr("class","lg");
  [{n:"营收",c:COMBO_BAR[0]},{n:"成本",c:COMBO_BAR[1]},{n:"同比%",c:COMBO_LINE[0]},{n:"预测%",c:COMBO_LINE[1]}].forEach(it=>{
    const i = lgHost.append("span").attr("class","lg-item");
    i.append("i").attr("class","lg-dot").style("background", it.c);
    i.append("span").text(it.n);
  });

  // state
  let zoomLo = 0, zoomHi = D_COMBO.length;

  const x = d3.scaleBand().range([0, innerW]).padding(0.15);
  // 左 Y 柱
  const allBars = D_COMBO.flatMap(d=>[d.rev,d.cost]);
  const bExt = d3.extent(allBars); const bs = niceScale(Math.min(0,bExt[0])*1.1, bExt[1]*1.1);
  const yL = d3.scaleLinear().domain([bs.min, bs.max]).range([innerH, 0]);
  // 右 Y 折线
  const allLines = D_COMBO.flatMap(d=>[d.yoy,d.fcst]);
  const lExt = d3.extent(allLines); const ls = niceScale(Math.min(0,lExt[0])*1.1, lExt[1]*1.1);
  const yR = d3.scaleLinear().domain([ls.min, ls.max]).range([innerH, 0]);

  const gGrid = g.append("g");
  const gBars = g.append("g");
  const gLineYoy = g.append("path").attr("fill","none").attr("stroke",COMBO_LINE[0]).attr("stroke-width",2);
  const gLineFcst= g.append("path").attr("fill","none").attr("stroke",COMBO_LINE[1]).attr("stroke-width",2);
  const gAxisXLine = g.append("line").attr("class","axis-line").attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);
  const gAxisX = g.append("g");
  const gAxisL = g.append("g");
  const gAxisR = g.append("g");
  const tip = attachTip(host);

  function draw(){
    const slice = D_COMBO.slice(zoomLo, zoomHi);
    x.domain(slice.map(d=>d.x));

    // grid (左 Y 主)
    const gridSel = gGrid.selectAll("line").data(bs.ticks);
    gridSel.join(
      enter=> enter.append("line")
                  .attr("class", d=> d===0?"zero-line":"grid-line")
                  .attr("x1",0).attr("x2",innerW)
                  .attr("y1",d=>yL(d)).attr("y2",d=>yL(d)),
      update=> update
                  .attr("class", d=> d===0?"zero-line":"grid-line")
                  .attr("y1",d=>yL(d)).attr("y2",d=>yL(d))
    );

    // bars (rev + cost) — group 内左右
    const barW = Math.min(14, x.bandwidth()/2 - 2);
    gBars.selectAll("g.bgrp").data(slice, d=>d.x).join(
      enter=> {
        const grp = enter.append("g").attr("class","bgrp")
          .attr("transform", d=> `translate(${x(d.x)+x.bandwidth()/2},0)`);
        grp.append("rect").attr("class","brev")
          .attr("x", -barW-1).attr("width", barW)
          .attr("fill", COMBO_BAR[0])
          .attr("y", d=> d.rev>=0? yL(d.rev): yL(0))
          .attr("height", d=> Math.abs(yL(d.rev) - yL(0)));
        grp.append("rect").attr("class","bcost")
          .attr("x", 1).attr("width", barW)
          .attr("fill", COMBO_BAR[1])
          .attr("y", d=> d.cost>=0? yL(d.cost): yL(0))
          .attr("height", d=> Math.abs(yL(d.cost) - yL(0)));
        // 鼠标热区
        grp.append("rect").attr("x", -x.bandwidth()/2).attr("width", x.bandwidth())
           .attr("y", 0).attr("height", innerH).attr("fill","transparent")
           .on("mousemove", function(ev, d){
              const [px,py] = d3.pointer(ev, host.node());
              tip.show(`<div class="tt-title">${d.x}</div>
                <div class="tt-row"><span class="tt-dot" style="background:${COMBO_BAR[0]}"></span><span class="nm">营收</span><span class="vl num">${d.rev}</span></div>
                <div class="tt-row"><span class="tt-dot" style="background:${COMBO_BAR[1]}"></span><span class="nm">成本</span><span class="vl num">${d.cost}</span></div>
                <div class="tt-row"><span class="tt-dot" style="background:${COMBO_LINE[0]}"></span><span class="nm">同比</span><span class="vl num">${d.yoy}%</span></div>
                <div class="tt-row"><span class="tt-dot" style="background:${COMBO_LINE[1]}"></span><span class="nm">预测</span><span class="vl num">${d.fcst}%</span></div>`, px, py);
           })
           .on("mouseleave", tip.hide);
        return grp;
      },
      update=> {
        update.attr("transform", d=> `translate(${x(d.x)+x.bandwidth()/2},0)`);
        update.select("rect.brev")
          .attr("x", -barW-1).attr("width", barW)
          .attr("y", d=> d.rev>=0? yL(d.rev): yL(0))
          .attr("height", d=> Math.abs(yL(d.rev) - yL(0)));
        update.select("rect.bcost")
          .attr("x", 1).attr("width", barW)
          .attr("y", d=> d.cost>=0? yL(d.cost): yL(0))
          .attr("height", d=> Math.abs(yL(d.cost) - yL(0)));
        update.select("rect[fill='transparent']")
          .attr("x", -x.bandwidth()/2).attr("width", x.bandwidth());
        return update;
      },
      exit=> exit.remove()
    );

    // lines
    const lineYoy = d3.line().x(d=> x(d.x)+x.bandwidth()/2).y(d=> yR(d.yoy)).curve(d3.curveMonotoneX);
    const lineFcst= d3.line().x(d=> x(d.x)+x.bandwidth()/2).y(d=> yR(d.fcst)).curve(d3.curveMonotoneX);
    gLineYoy.datum(slice).attr("d", lineYoy);
    gLineFcst.datum(slice).attr("d", lineFcst);

    // x axis labels — 抽稀
    gAxisX.selectAll("*").remove();
    const stride = Math.max(1, Math.ceil(slice.length / (isMobile?6:10)));
    slice.forEach((d,i)=>{
      if(i % stride !== 0 && i !== slice.length-1) return;
      gAxisX.append("text").attr("class","axis-label")
        .attr("x", x(d.x)+x.bandwidth()/2)
        .attr("y", innerH+16)
        .attr("text-anchor","middle")
        .text(d.x);
    });

    // y left 柱 — Ainvest §3.1 PC 形式 B
    gAxisL.selectAll("*").remove();
    bs.ticks.forEach(t=>{
      gAxisL.append("text").attr("class","axis-label")
        .attr("x", isMobile? 4 : -8)
        .attr("y", yL(t)+ (isMobile? -2 : 4))
        .attr("text-anchor", isMobile? "start":"end")
        .text(t);
    });
    // y right 折线 %
    gAxisR.selectAll("*").remove();
    ls.ticks.forEach(t=>{
      gAxisR.append("text").attr("class","axis-label")
        .attr("x", innerW + 6).attr("y", yR(t)+4)
        .attr("text-anchor","start")
        .text(t+"%");
    });
  }
  draw();

  watermark(svg, margin.left, H-26);

  /* DataZoom · Ainvest §1.13 */
  const dz = host.append("div").attr("class","dz").style("width", (W-margin.left-margin.right)+"px").style("margin-left", margin.left+"px");
  dz.append("div").attr("class","track");
  const fill = dz.append("div").attr("class","fill");
  const hL = dz.append("div").attr("class","handle hL");
  hL.append("div").attr("class","grip").html("<i></i><i></i><i></i>");
  const hR = dz.append("div").attr("class","handle hR");
  hR.append("div").attr("class","grip").html("<i></i><i></i><i></i>");

  const N = D_COMBO.length;
  let trackW = 0;
  function layout(){
    trackW = dz.node().getBoundingClientRect().width;
    update();
  }
  function update(){
    const xL = (zoomLo / N) * (trackW - 32); // 边缘对齐
    const xR = (zoomHi / N) * (trackW - 32) + 32;
    hL.style("left", xL+"px");
    hR.style("left", (xR-32)+"px");
    fill.style("left", (xL+16)+"px").style("width", Math.max(0, xR-xL-32)+"px");
    draw();
  }
  function dragHandle(handle, isLeft){
    handle.on("mousedown", (ev)=>{
      ev.preventDefault();
      const rect = dz.node().getBoundingClientRect();
      function mv(e){
        const rel = e.clientX - rect.left;
        const idx = Math.round((rel - (isLeft?16:16)) / (trackW - 32) * N);
        if(isLeft){
          zoomLo = Math.max(0, Math.min(zoomHi-2, idx));
        }else{
          zoomHi = Math.min(N, Math.max(zoomLo+2, idx));
        }
        update();
      }
      function up(){
        window.removeEventListener("mousemove",mv);
        window.removeEventListener("mouseup",up);
      }
      window.addEventListener("mousemove",mv);
      window.addEventListener("mouseup",up);
    });
  }
  dragHandle(hL, true);
  dragHandle(hR, false);
  requestAnimationFrame(layout);
  window.addEventListener("resize", layout);
}

/* ---------- 5. Stacked Bar (有负 → 双向堆叠) ---------- */
function renderStackBar(host, isMobile){
  const W = isMobile? 319: 720, H = 240;
  const margin = {top:30, right:48, bottom:30, left:8};
  const svg = buildSVG(host, W, H, isMobile);

  const color = d3.scaleOrdinal().domain(keys).range(["#265FFC","#38D1FF","#F564B9","#9EA9C7"]);
  const stack = d3.stack().keys(keys).offset(d3.stackOffsetDiverging);
  const series = stack(D_STACK);

  const x = d3.scaleBand().domain(D_STACK.map(d=>d.x)).range([0, innerW]).padding(0.4);
  const ys = series.flat(2);
  const yExt = d3.extent(ys);

  const y = d3.scaleLinear().domain([ns.min, ns.max]).range([innerH, 0]);

  // legend
  const lg = host.insert("div","svg").attr("class","lg");
  keys.forEach(k=>{
    const it = lg.append("span").attr("class","lg-item");
    it.append("i").attr("class","lg-dot").style("background", color(k));
    it.append("span").text(k);
  });

  g.selectAll("line.grid").data(ns.ticks).enter().append("line")
    .attr("class", d=> d===0?"zero-line":"grid-line")
    .attr("x1",0).attr("x2",innerW).attr("y1",d=>y(d)).attr("y2",d=>y(d));

  g.selectAll("g.layer").data(series).enter().append("g")
    .attr("class","layer").attr("fill", d=> color(d.key))
    .selectAll("rect").data(d=>d).enter().append("rect")
    .attr("x", d=> x(d.data.x))
    .attr("width", Math.min(x.bandwidth(), 32))
    .attr("transform", `translate(${(x.bandwidth()-Math.min(x.bandwidth(),32))/2},0)`)
    .attr("y", d=> y(d[1]))
    .attr("height", d=> Math.max(0, y(d[0]) - y(d[1])));

  // axes
  g.append("line").attr("class","axis-line").attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);
  g.selectAll("text.x").data(D_STACK).enter().append("text")
    .attr("class","axis-label").attr("x", d=>x(d.x)+x.bandwidth()/2).attr("y", innerH+16)
    .attr("text-anchor","middle").text(d=>d.x);
  g.selectAll("text.y").data(ns.ticks).enter().append("text")
    .attr("class","axis-label").attr("x", innerW + (isMobile?-4:8))
    .attr("y", d=>y(d)+(isMobile?-2:4)).attr("text-anchor", isMobile?"end":"start").text(d=>d);

  watermark(svg, margin.left, H-26);
}

/* ---------- 6. Normalized Stacked Bar ---------- */
function renderNormStack(host, isMobile){

  const keys = ["US","EU","CN","ROW"];

  // 归一化：用绝对值占比
  const data = D_NORM.map(d=>{
    const tot = keys.reduce((s,k)=> s+Math.abs(d[k]), 0);
    const o = {x:d.x};
    keys.forEach(k=> o[k] = Math.abs(d[k])/tot * 100);
    return o;
  });
  const stack = d3.stack().keys(keys);
  const series = stack(data);

  const x = d3.scaleBand().domain(data.map(d=>d.x)).range([0,innerW]).padding(0.4);
  const y = d3.scaleLinear().domain([0,100]).range([innerH, 0]);

  // legend
  const lg = host.insert("div","svg").attr("class","lg");
  keys.forEach(k=>{
    const it = lg.append("span").attr("class","lg-item");
    it.append("i").attr("class","lg-dot").style("background", color(k));
    it.append("span").text(k);
  });

  [0,25,50,75,100].forEach(t=>{
    g.append("line").attr("class", t===0?"zero-line":"grid-line")
      .attr("x1",0).attr("x2",innerW).attr("y1",y(t)).attr("y2",y(t));
  });

  g.selectAll("g.layer").data(series).enter().append("g")
    .attr("class","layer").attr("fill", d=> color(d.key))
    .selectAll("rect").data(d=>d).enter().append("rect")
    .attr("x", d=> x(d.data.x))
    .attr("width", Math.min(x.bandwidth(), 32))
    .attr("transform", `translate(${(x.bandwidth()-Math.min(x.bandwidth(),32))/2},0)`)
    .attr("y", d=> y(d[1])).attr("height", d=> y(d[0])-y(d[1]));

  g.append("line").attr("class","axis-line").attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);
  g.selectAll("text.x").data(data).enter().append("text")
    .attr("class","axis-label").attr("x",d=>x(d.x)+x.bandwidth()/2).attr("y",innerH+16)
    .attr("text-anchor","middle").text(d=>d.x);
  [0,25,50,75,100].forEach(t=>{
    g.append("text").attr("class","axis-label")
      .attr("x", innerW + (isMobile?-4:8))
      .attr("y", y(t)+(isMobile?-2:4))
      .attr("text-anchor", isMobile?"end":"start").text(t+"%");

}

/* ---------- 7. Waterfall (Ainvest 箭头柱形 §1.12, 含负) ---------- */
function renderWaterfall(host, isMobile){
  const W = isMobile? 319: 720, H = 260;
  const margin = {top:24, right:48, bottom:48, left:8};
  const svg = buildSVG(host, W, H, isMobile);
  const innerW = W - margin.left - margin.right, innerH = H - margin.top - margin.bottom;
  const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

  // 计算每根柱的起止 — 末项 total 自动累加
  const data = JSON.parse(JSON.stringify(D_WATERFALL));
  let acc = 0;
  data.forEach((d,i)=>{
    if(d.type==="total" && i===0){ d.from=0; d.to=d.v; acc=d.v; }
    else if(d.type==="total"){ d.from=0; d.to=acc; d.v=acc; }
    else { d.from = acc; acc += d.v; d.to = acc; }
  });

  const x = d3.scaleBand().domain(data.map(d=>d.name)).range([0,innerW]).padding(0.35);
  const yMin = Math.min(0, d3.min(data, d=>Math.min(d.from,d.to)));
  const yMax = d3.max(data, d=>Math.max(d.from,d.to));
  const ns = niceScale(yMin, yMax*1.1);
  const y = d3.scaleLinear().domain([ns.min, ns.max]).range([innerH, 0]);

  g.selectAll("line.grid").data(ns.ticks).enter().append("line")
    .attr("class", d=>d===0?"zero-line":"grid-line")
    .attr("x1",0).attr("x2",innerW).attr("y1",d=>y(d)).attr("y2",d=>y(d));

  const primary = "#265FFC";
  const fill = "rgba(38,95,252,0.20)";
  const arrowSize = 4;

  data.forEach(d=>{
    const cx = x(d.name) + x.bandwidth()/2;
    const w  = Math.min(x.bandwidth(), 36);
    const yTop = y(Math.max(d.from,d.to));
    const yBot = y(Math.min(d.from,d.to));
    const h = yBot - yTop;
    const left = cx - w/2;

    if(d.type==="total"){
      g.append("rect").attr("x",left).attr("y",y(d.to)).attr("width",w)
        .attr("height", y(0) - y(d.to)).attr("fill", primary);
    }else{
      g.append("rect").attr("x",left).attr("y",yTop).attr("width",w).attr("height", h).attr("fill", fill);
      // 端线（生长基点）
      if(d.type==="inc"){
        g.append("line").attr("x1",left).attr("x2",left+w).attr("y1",yBot).attr("y2",yBot)
          .attr("stroke", primary).attr("stroke-width", 2);
        // 向上箭头线
        g.append("line").attr("x1",cx).attr("x2",cx).attr("y1",yBot).attr("y2",yTop+6)
          .attr("stroke", primary).attr("stroke-opacity",0.4).attr("stroke-width",1.5);
        g.append("path").attr("d",`M${cx-arrowSize},${yTop+6} L${cx+arrowSize},${yTop+6} L${cx},${yTop} Z`)
          .attr("fill", primary).attr("fill-opacity",0.4);
      }else{
        g.append("line").attr("x1",left).attr("x2",left+w).attr("y1",yTop).attr("y2",yTop)
          .attr("stroke", primary).attr("stroke-width", 2);
        g.append("line").attr("x1",cx).attr("x2",cx).attr("y1",yTop).attr("y2",yBot-6)
          .attr("stroke", primary).attr("stroke-opacity",0.4).attr("stroke-width",1.5);
        g.append("path").attr("d",`M${cx-arrowSize},${yBot-6} L${cx+arrowSize},${yBot-6} L${cx},${yBot} Z`)
          .attr("fill", primary).attr("fill-opacity",0.4);
      }
    }
    // 柱顶 label
    g.append("text").attr("class","data-label")
      .attr("x", cx).attr("y", yTop - 4).attr("text-anchor","middle")
      .text(d.type==="total"? d.to : (d.v>0?"+":"")+d.v);
  });

  g.append("line").attr("class","axis-line").attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);
  g.selectAll("text.x").data(data).enter().append("text")
    .attr("class","axis-label").attr("x", d=>x(d.name)+x.bandwidth()/2)
    .attr("y", innerH + 16).attr("text-anchor","middle")
    .attr("transform", d=> isMobile? `rotate(-30 ${x(d.name)+x.bandwidth()/2} ${innerH+16})`:"")
    .text(d=>d.name);

  watermark(svg, margin.left, H-26);
}

    const a0 = (i / n) * Math.PI*2 - Math.PI/2 - Math.PI/n;
    const a1 = (i / n) * Math.PI*2 - Math.PI/2 + Math.PI/n;
    const r = (d.v / vMax) * maxR;
    const arc = d3.arc().innerRadius(2).outerRadius(r).startAngle(a0).endAngle(a1).cornerRadius(2);
    svg.append("path").attr("transform",`translate(${cx},${cy})`).attr("d", arc())
      .attr("fill", PALETTE[i%PALETTE.length]).attr("opacity",0.92);
    // label
    const aMid = (a0+a1)/2;
    const lx = cx + Math.cos(aMid) * (r + 14);
    const ly = cy + Math.sin(aMid) * (r + 14);
    svg.append("text").attr("class","axis-label").attr("x", lx).attr("y", ly+3).attr("text-anchor","middle").text(d.name);
  });
  watermark(svg, 14, H-26);
}

/* ---------- 17. Radar ---------- */
function renderRadar(host, isMobile){
  const W = isMobile? 319: 720, H = 280;
  const svg = buildSVG(host, W, H, isMobile);
  const cx = W/2, cy = H/2;
  const R = 90;
  const axes = D_RADAR.axes;
  const n = axes.length;
  // 网格
  [0.25, 0.5, 0.75, 1].forEach(t=>{
    const r = R*t;
    const pts = d3.range(n).map(i=>{
      const a = (i/n)*Math.PI*2 - Math.PI/2;
      return [cx + Math.cos(a)*r, cy + Math.sin(a)*r];
    });
    svg.append("polygon").attr("points", pts.join(" ")).attr("fill","none").attr("stroke","rgba(0,0,0,0.10)");
  });
  // 轴线 + label
  axes.forEach((a,i)=>{
    const ang = (i/n)*Math.PI*2 - Math.PI/2;
    const lx = cx + Math.cos(ang)*R;
    const ly = cy + Math.sin(ang)*R;
    svg.append("line").attr("x1",cx).attr("y1",cy).attr("x2",lx).attr("y2",ly).attr("stroke","rgba(0,0,0,0.08)");
    svg.append("text").attr("class","axis-label").attr("x", cx + Math.cos(ang)*(R+12)).attr("y", cy + Math.sin(ang)*(R+12)+4)
      .attr("text-anchor","middle").text(a);
  });
  // 系列
  const lg = host.insert("div","svg").attr("class","lg");
  D_RADAR.series.forEach((s,si)=>{
    const it = lg.append("span").attr("class","lg-item");
    it.append("i").attr("class","lg-dot").style("background", s.color);
    it.append("span").text(s.name);
    const pts = s.values.map((v,i)=>{
      const ang = (i/n)*Math.PI*2 - Math.PI/2;
      return [cx + Math.cos(ang)*R*(v/100), cy + Math.sin(ang)*R*(v/100)];
    });
    svg.append("polygon").attr("points", pts.join(" "))
      .attr("fill", s.color).attr("fill-opacity",0.16)
      .attr("stroke", s.color).attr("stroke-width", 2);
    pts.forEach(p=>{
      svg.append("circle").attr("cx",p[0]).attr("cy",p[1]).attr("r",3).attr("fill",s.color).attr("stroke",s.color).attr("stroke-width",2);
    });
  });
  watermark(svg, 14, H-26);
}

/* ---------- 22. Two Way Tree ---------- */
function renderTwoWayTree(host, isMobile){
  const W = isMobile? 319: 720, H = 280;
  const svg = buildSVG(host, W, H, isMobile);
  const cx = W/2, cy = H/2;

  function layoutSide(items, dir){ // dir: -1 left / +1 right
    const lines = [];
    const xStep1 = isMobile? 70 : 100;
    const xStep2 = isMobile? 60 : 90;
    items.forEach((it, i)=>{
      const ay = cy + (i - (items.length-1)/2) * 60;
      const ax = cx + dir * xStep1;
      lines.push({type:"l1", text: it.name, x:ax, y:ay, parent:{x:cx,y:cy}});
      (it.children||[]).forEach((ch, j)=>{
        const by = ay + (j - ((it.children.length-1)/2)) * 26;
        const bx = ax + dir * xStep2;
        lines.push({type:"l2", text: ch.name, x:bx, y:by, parent:{x:ax,y:ay}});
      });
    });
    return lines;
  }
  const left = layoutSide(D_TREE.left, -1);
  const right = layoutSide(D_TREE.right, +1);

  function drawSide(nodes, isRight){
    nodes.forEach(n=>{
      svg.append("path")
        .attr("d", `M${n.parent.x},${n.parent.y} C${(n.parent.x+n.x)/2},${n.parent.y} ${(n.parent.x+n.x)/2},${n.y} ${n.x},${n.y}`)
        .attr("fill","none").attr("stroke","#9EA9C7").attr("stroke-width",1);
      const w = Math.max(60, n.text.length*8 + 14);
      svg.append("rect").attr("x", isRight? n.x : n.x-w)
        .attr("y", n.y-12).attr("width", w).attr("height", 24).attr("rx", 4)
        .attr("fill", n.type==="l1" ? "#265FFC" : "#fff")
        .attr("stroke", n.type==="l1" ? "none" : "#9EA9C7");
      svg.append("text").attr("x", isRight? n.x+w/2 : n.x-w/2).attr("y", n.y+4)
        .attr("text-anchor","middle").attr("font-size",11)
        .attr("fill", n.type==="l1" ? "#fff" : "var(--text-primary)").text(n.text);
    });
  }
  drawSide(left, false);
  drawSide(right, true);

  // root
  svg.append("rect").attr("x", cx-40).attr("y", cy-16).attr("width",80).attr("height",32).attr("rx",4).attr("fill","#273D8F");
  svg.append("text").attr("x",cx).attr("y",cy+5).attr("text-anchor","middle").attr("fill","#fff").attr("font-weight",700).text(D_TREE.name);

  watermark(svg, 14, H-26);
}

/* ---------- 23. Relationship Diagram (force) ---------- */
function renderGraph(host, isMobile){
  const W = isMobile? 319: 720, H = 280;
  const svg = buildSVG(host, W, H, isMobile);
  const nodes = D_GRAPH.nodes.map(d=>({...d}));
  const links = D_GRAPH.links.map(d=>({...d}));
  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d=>d.id).distance(60))
    .force("charge", d3.forceManyBody().strength(-160))
    .force("center", d3.forceCenter(W/2, H/2))
    .force("col", d3.forceCollide(d=>d.r+4))
    .stop();
  for(let i=0;i<260;i++) sim.tick();

  svg.append("g").selectAll("line").data(links).enter().append("line")
    .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y)
    .attr("stroke","rgba(0,0,0,0.12)").attr("stroke-width",1);

  const g = svg.append("g");
  g.selectAll("circle").data(nodes).enter().append("circle")
    .attr("cx",d=>d.x).attr("cy",d=>d.y).attr("r",d=>d.r)
    .attr("fill", d=> PALETTE[d.g % PALETTE.length])
    .attr("fill-opacity",0.84)
    .attr("stroke","#fff").attr("stroke-width",1);
  g.selectAll("text").data(nodes).enter().append("text")
    .attr("x", d=>d.x).attr("y", d=> d.y - d.r - 4)
    .attr("text-anchor","middle").attr("font-size",10).attr("fill","var(--text-primary)").attr("font-weight",600)
    .text(d=> d.id);

  watermark(svg, 14, H-26);
}

/* ---------- 26. Marker (auxiliary 叠加 — 折线 + 圆形+标签标记) ---------- */
function renderMarker(host, isMobile){
  const W = isMobile? 319: 720, H = 240;
  const margin = {top:24, right:48, bottom:30, left:8};
  const svg = buildSVG(host, W, H, isMobile);
  const innerW = W - margin.left - margin.right, innerH = H - margin.top - margin.bottom;
  const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

  const x = d3.scaleLinear().domain(d3.extent(D_LINE,d=>d.x)).range([0,innerW]);
  const ext = d3.extent(D_LINE,d=>d.y); const ns = niceScale(Math.min(0,ext[0])*1.1, ext[1]*1.1);
  const y = d3.scaleLinear().domain([ns.min, ns.max]).range([innerH,0]);

  g.selectAll("line.grid").data(ns.ticks).enter().append("line")
    .attr("class",d=>d===0?"zero-line":"grid-line").attr("x1",0).attr("x2",innerW)
    .attr("y1",d=>y(d)).attr("y2",d=>y(d));

  const line = d3.line().x(d=>x(d.x)).y(d=>y(d.y)).curve(d3.curveMonotoneX);
  g.append("path").datum(D_LINE).attr("d",line).attr("fill","none").attr("stroke","#9EA9C7").attr("stroke-width",2);

  // 关键点标记 — 高 / 低 / 拐点
  const minPt = D_LINE.reduce((a,b)=> b.y<a.y?b:a);
  const maxPt = D_LINE.reduce((a,b)=> b.y>a.y?b:a);
  [{p:maxPt, c:UP, lab:"峰值 "+maxPt.y}, {p:minPt, c:DOWN, lab:"谷底 "+minPt.y}].forEach(m=>{
    const px = x(m.p.x), py = y(m.p.y);
    g.append("circle").attr("cx", px).attr("cy", py).attr("r", 6).attr("fill","#fff").attr("stroke",m.c).attr("stroke-width",2);
    const w = m.lab.length*6 + 14;
    g.append("rect").attr("x", px - w/2).attr("y", py-26).attr("width", w).attr("height", 16).attr("rx",4).attr("fill", m.c);
    g.append("text").attr("x", px).attr("y", py-14).attr("text-anchor","middle").attr("font-size",10).attr("font-weight",600).attr("fill","#fff").text(m.lab);
  });

  ns.ticks.forEach(t=>{
    g.append("text").attr("class","axis-label").attr("x",innerW+(isMobile?-4:8)).attr("y",y(t)+(isMobile?-2:4))
      .attr("text-anchor",isMobile?"end":"start").text(t);
  });
  g.append("line").attr("class","axis-line").attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);

  watermark(svg, margin.left, H-26);
}

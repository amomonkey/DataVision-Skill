<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Ainvest 主题 · D3 聚焦测试集（折柱组合 / 饼图 / 分组柱）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{
  /* Ainvest 色板 §1.1（8 色，整套替换 base） */
  --c1:#265FFC; --c2:#38D1FF; --c3:#F564B9; --c4:#733ED6;
  --c5:#00DDCB; --c6:#273D8F; --c7:#FF7040; --c8:#9EA9C7;

  /* 字体 §1.3 */
  --ff:"Plus Jakarta Sans", -apple-system, "Helvetica Neue", Arial, sans-serif;

  /* 文本 */
  --text-primary:rgba(0,0,0,0.84);
  --text-secondary:rgba(0,0,0,0.6);

  /* 网格 / 轴 §2.2 */
  --grid:rgba(0,0,0,0.10);
  --axis:#808080;
  --zero:#858585;

  /* Tooltip §1.6 */
  --tt-bg:#383838;

  /* DataZoom §1.13 */
  --dz-track:rgba(0,0,0,0.06);
  --dz-fill:rgba(0,0,0,0.6);
}

*{box-sizing:border-box}
body{margin:0;padding:24px;background:#F4F5F7;font-family:var(--ff);color:var(--text-primary);}
header.page{margin-bottom:20px}
header.page h1{font-size:20px;font-weight:600;margin:0 0 4px 0}
header.page .meta{font-size:12px;color:var(--text-secondary)}

.row{background:#fff;border-radius:8px;padding:18px 22px;margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.row h2{font-size:14px;font-weight:600;margin:0 0 4px}
.row .desc{font-size:11px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6}

.compare{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:24px;align-items:start}
.col-label{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text-secondary);text-transform:uppercase;margin-bottom:6px}
.viewport{position:relative;background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:6px;padding:12px 12px 18px;overflow:visible}
.viewport.mobile{width:343px}

svg.chart{display:block;font-family:var(--ff)}
svg.chart text{font-family:var(--ff)}
svg.chart .axis-label{font-size:11px;fill:var(--text-secondary);font-weight:500}
svg.chart.mobile .axis-label{font-size:10px}
svg.chart .axis-line{stroke:var(--axis);stroke-width:.5}
svg.chart .grid-line{stroke:var(--grid);stroke-width:1;shape-rendering:crispEdges}
svg.chart .zero-line{stroke:var(--zero);stroke-width:1;shape-rendering:crispEdges}
svg.chart .label-num{font-size:10px;font-weight:500;fill:var(--text-secondary)}

.lg{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;line-height:16px;color:var(--text-secondary);margin-bottom:8px}
.lg-item{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.lg-item.off{opacity:.32}
.lg-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

.tt{
  position:absolute;pointer-events:none;background:var(--tt-bg);color:#fff;
  font-family:var(--ff);font-size:12px;line-height:16px;
  padding:8px 10px;border-radius:4px;min-width:140px;
  transform:translate(-50%, calc(-100% - 10px));opacity:0;transition:opacity .08s;z-index:20
}
.tt .tt-title{font-size:12px;opacity:.84;margin-bottom:4px}
.tt .tt-row{display:flex;align-items:center;gap:8px}
.tt .tt-row .nm{flex:1;opacity:.84}
.tt .tt-row .vl{font-weight:600;font-variant-numeric:tabular-nums}
.tt-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.tt::after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);
  border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid var(--tt-bg)}

/* DataZoom §1.13 — 4px 细轨 + 32×32 全圆把手 + 边缘对齐 */
.dz{position:relative;height:32px;margin-top:14px}
.dz .track{position:absolute;left:0;right:0;top:14px;height:4px;background:var(--dz-track);border-radius:2px}
.dz .fill{position:absolute;top:14px;height:4px;background:var(--dz-fill);border-radius:2px}
.dz .handle{position:absolute;width:32px;height:32px;top:0;border-radius:50%;background:#fff;
  border:1px solid rgba(0,0,0,0.10);box-shadow:0 1px 4px rgba(0,0,0,0.12);
  cursor:ew-resize;display:flex;align-items:center;justify-content:center}
.dz .handle .grip{display:flex;flex-direction:column;gap:3px}
.dz .handle .grip i{display:block;width:10px;height:1.5px;background:rgba(0,0,0,0.6)}
</style>
</head>
<body>

<main id="app"></main>

<script>
/* ====================== Theme tokens ====================== */
const COMBO_BAR  = ["#265FFC","#38D1FF","#F564B9","#733ED6","#00DDCB","#273D8F"]; // §1.2 柱
const COMBO_LINE = ["#FF7040","#9EA9C7"];                                          // §1.2 折线
const PIE_PAL    = ["#265FFC","#38D1FF","#F564B9","#733ED6","#00DDCB","#273D8F","#FF7040","#9EA9C7"]; // §1.1

/* ====================== Mock data (含负值) ====================== */
// 折柱组合 — 36 期日度
const D_COMBO = d3.range(36).map(i=>{
  const day = i+1;
  const trend  = Math.sin(i/3.5)*30;
  const slump  = i>=24 && i<=30 ? -28 : 0;
  return {
    x: `D${String(day).padStart(2,"0")}`,
    rev:  Math.round(48 + trend + slump + (Math.random()-0.5)*8),
    cost: Math.round(26 + Math.cos(i/2.8)*14 + (Math.random()-0.5)*6),
    yoy:  +(Math.sin(i/4)*32 + (i>=24?-18:0) + (Math.random()-0.5)*4).toFixed(1),
    fcst: +(Math.cos(i/5)*22 + 6 + (Math.random()-0.5)*3).toFixed(1)
  };
});

// 饼图 — S&P500 权重示意
const D_PIE = [
  {name:"Tech",       v:32.4},
  {name:"Financials", v:14.1},
  {name:"Healthcare", v:12.6},
  {name:"Consumer",   v:10.8},
  {name:"Industrials",v: 8.5},
  {name:"Energy",     v: 5.7},
  {name:"Utilities",  v: 4.2},
  {name:"Materials",  v:11.7}
];

// 分组柱 — 4 系列 × 8 期，含负
const SERIES_G = [
  {key:"AAPL",  color:COMBO_BAR[0]},
  {key:"MSFT",  color:COMBO_BAR[1]},
  {key:"NVDA",  color:COMBO_BAR[2]},
  {key:"TSLA",  color:COMBO_BAR[3]}
];
const D_GBAR = ["FY21","FY22","FY23","FY24","FY25E","Q1","Q2","Q3"].map((x,i)=>{
  return {
    x,
    AAPL: [14, -6, 22, 18, 26, 8, 12, -4][i],
    MSFT: [12,  9, 18, 21, 24, 7, 10, 14][i],
    NVDA: [ 8, -3, 28, 42, 36, 16, 18, -8][i],
    TSLA: [-4, 16,-12,  6, 22, -8,  4,  2][i]
  };
});

/* ====================== Helpers ====================== */
const app = d3.select("#app");

function row(id, title, desc){
  const root = app.append("section").attr("class","row").attr("id",id);
  root.append("h2").text(title);
  if(desc) root.append("div").attr("class","desc").html(desc);
  const cmp = root.append("div").attr("class","compare");
  const left  = cmp.append("div");
  left.append("div").attr("class","col-label").text("WEB · PC");
  const web = left.append("div").attr("class","viewport web");
  const right = cmp.append("div");
  right.append("div").attr("class","col-label").text("APP · Mobile");
  const mob = right.append("div").attr("class","viewport mobile");
  return {web, mob};
}

function tooltip(host){
  const tt = host.append("div").attr("class","tt");
  return {
    show(html, x, y){ tt.html(html).style("left",x+"px").style("top",y+"px").style("opacity",1); },
    hide(){ tt.style("opacity",0); }
  };
}

function watermark(svg, x, y){
  svg.append("use").attr("href","#wm").attr("x",x).attr("y",y).attr("width",96).attr("height",20);
}

function niceScale(vmin, vmax){
  if(vmin === vmax){ vmin -= 1; vmax += 1; }
  const step0 = (vmax-vmin)/4;
  const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(step0)||1)));
  const n = step0/mag;
  let step;
  if(n < 1.5) step = 1;
  else if(n < 3) step = 2;
  else if(n < 7.5) step = 5;
  else step = 10;
  step *= mag;
  const min = Math.floor(vmin/step)*step;
  const max = min + step*4;
  return {min, max, step, ticks: d3.range(min, max+step/2, step)};
}

function svgBase(host, w, h, isMobile){
  return host.append("svg").attr("class","chart"+(isMobile?" mobile":""))
    .attr("width",w).attr("height",h).attr("viewBox",`0 0 ${w} ${h}`);
}

/* legend with click toggle */
function legendDOM(host, items, onToggle){
  const lg = host.insert("div", "svg").attr("class","lg");
  const state = items.map(()=> true);
  items.forEach((it,i)=>{
    const s = lg.append("span").attr("class","lg-item")
      .on("click", function(){
        state[i] = !state[i];
        d3.select(this).classed("off", !state[i]);
        onToggle && onToggle(state.slice());
      });
    s.append("i").attr("class","lg-dot").style("background", it.color);
    s.append("span").text(it.name);
  });
  return {state};
}

/* ====================== 1. Bar + Line Combo (DataZoom + 负值) ====================== */
function renderCombo(host, isMobile){
  const W = isMobile ? 319 : 760, H = 280;
  const margin = {top:30, right:48, bottom:28, left: isMobile? 8 : 48};
  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;

  const lg = host.insert("div","svg").attr("class","lg");
  const items = [
    {n:"营收 (亿)",  c:COMBO_BAR[0]},
    {n:"成本 (亿)",  c:COMBO_BAR[1]},
    {n:"同比 %",     c:COMBO_LINE[0]},
    {n:"预测 %",     c:COMBO_LINE[1]}
  ];
  const visible = items.map(()=> true);
  items.forEach((it,i)=>{
    const s = lg.append("span").attr("class","lg-item").on("click", function(){
      visible[i] = !visible[i];
      d3.select(this).classed("off", !visible[i]);
      draw();
    });
    s.append("i").attr("class","lg-dot").style("background", it.c);
    s.append("span").text(it.n);
  });

  const svg = svgBase(host, W, H, isMobile);
  const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);
  const tt = tooltip(host);

  // 静态比例尺（柱 / 折线全期）
  const allBars  = D_COMBO.flatMap(d=>[d.rev,d.cost]);
  const allLines = D_COMBO.flatMap(d=>[d.yoy,d.fcst]);
  const bs = niceScale(Math.min(0,d3.min(allBars))*1.1, d3.max(allBars)*1.15);
  const ls = niceScale(Math.min(0,d3.min(allLines))*1.1, d3.max(allLines)*1.15);
  const yL = d3.scaleLinear().domain([bs.min, bs.max]).range([innerH, 0]);
  const yR = d3.scaleLinear().domain([ls.min, ls.max]).range([innerH, 0]);
  const x  = d3.scaleBand().padding(0.18).range([0, innerW]);

  // 网格（按左轴）
  g.selectAll("line.grid").data(bs.ticks).enter().append("line")
    .attr("class", d=> d===0 ? "zero-line" : "grid-line")
    .attr("x1",0).attr("x2",innerW)
    .attr("y1", d=>yL(d)).attr("y2", d=>yL(d));

  // X 轴底线
  g.append("line").attr("class","axis-line")
    .attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);

  // 左 Y 标签（PC 形式 B：外侧右对齐；Mobile 形式 A：内侧左对齐）
  const gAxisL = g.append("g");
  bs.ticks.forEach(t=>{
    gAxisL.append("text").attr("class","axis-label")
      .attr("x", isMobile? 4 : -8)
      .attr("y", yL(t) + (isMobile? -3 : 4))
      .attr("text-anchor", isMobile? "start" : "end")
      .text(t);
  });
  // 右 Y 标签（折线 %）
  const gAxisR = g.append("g");
  ls.ticks.forEach(t=>{
    gAxisR.append("text").attr("class","axis-label")
      .attr("x", innerW + 6).attr("y", yR(t)+4)
      .text(t+"%");
  });

  // dynamic groups
  const gBars   = g.append("g");
  const gHotzone= g.append("g");
  const gYoy    = g.append("path").attr("fill","none").attr("stroke",COMBO_LINE[0]).attr("stroke-width",2);
  const gFcst   = g.append("path").attr("fill","none").attr("stroke",COMBO_LINE[1]).attr("stroke-width",2);
  const gYoyDot = g.append("g");
  const gFcstDot= g.append("g");
  const gXAxis  = g.append("g");

  // DataZoom state
  let lo=0, hi=Math.min(D_COMBO.length, isMobile?14:20);
  const N = D_COMBO.length;

  function draw(){
    const slice = D_COMBO.slice(lo, hi);
    x.domain(slice.map(d=>d.x));

    // bars
    const barInner = Math.min(14, x.bandwidth()/2 - 2);
    const offRev = -barInner-1, offCost = 1;

    const sel = gBars.selectAll("g.grp").data(slice, d=>d.x);
    sel.exit().remove();
    const ent = sel.enter().append("g").attr("class","grp");
    const merged = ent.merge(sel)
      .attr("transform", d=> `translate(${x(d.x)+x.bandwidth()/2},0)`);

    // rev
    merged.each(function(d){
      const sel = d3.select(this);
      let r1 = sel.select("rect.rev");
      if(r1.empty()) r1 = sel.append("rect").attr("class","rev").attr("fill", COMBO_BAR[0]);
      r1.attr("x", offRev).attr("width", barInner)
        .attr("y", d.rev>=0 ? yL(d.rev) : yL(0))
        .attr("height", Math.abs(yL(d.rev)-yL(0)))
        .attr("opacity", visible[0]?1:0);
      let r2 = sel.select("rect.cost");
      if(r2.empty()) r2 = sel.append("rect").attr("class","cost").attr("fill", COMBO_BAR[1]);
      r2.attr("x", offCost).attr("width", barInner)
        .attr("y", d.cost>=0 ? yL(d.cost) : yL(0))
        .attr("height", Math.abs(yL(d.cost)-yL(0)))
        .attr("opacity", visible[1]?1:0);
    });

    // 折线（含负 yoy）
    const lineGen = key => d3.line()
      .defined(d=> d[key] != null)
      .x(d=> x(d.x)+x.bandwidth()/2)
      .y(d=> yR(d[key]))
      .curve(d3.curveMonotoneX);
    gYoy.datum(slice).attr("d", lineGen("yoy")).attr("opacity", visible[2]?1:0);
    gFcst.datum(slice).attr("d", lineGen("fcst")).attr("opacity", visible[3]?1:0);

    // 点（数据点 6px 描边 2px，Ainvest §1.4）
    function drawDots(layer, key, color, on){
      const dots = layer.selectAll("circle").data(slice, d=>d.x);
      dots.exit().remove();
      const e = dots.enter().append("circle").attr("r",3)
        .attr("fill", color).attr("stroke", color).attr("stroke-width",2);
      e.merge(dots)
        .attr("cx", d=> x(d.x)+x.bandwidth()/2)
        .attr("cy", d=> yR(d[key]))
        .attr("opacity", on ? 1 : 0);
    }
    drawDots(gYoyDot,  "yoy",  COMBO_LINE[0], visible[2]);
    drawDots(gFcstDot, "fcst", COMBO_LINE[1], visible[3]);

    // X 轴标签（抽稀）
    gXAxis.selectAll("*").remove();
    const stride = Math.max(1, Math.ceil(slice.length / (isMobile?6:10)));
    slice.forEach((d,i)=>{
      if(i % stride !== 0 && i !== slice.length-1) return;
      gXAxis.append("text").attr("class","axis-label")
        .attr("x", x(d.x)+x.bandwidth()/2).attr("y", innerH+15)
        .attr("text-anchor","middle").text(d.x);
    });

    // 热区 + tooltip
    const hot = gHotzone.selectAll("rect.hot").data(slice, d=>d.x);
    hot.exit().remove();
    hot.enter().append("rect").attr("class","hot").attr("fill","transparent")
      .merge(hot)
        .attr("x", d=> x(d.x))
        .attr("y", 0)
        .attr("width", x.bandwidth())
        .attr("height", innerH)
        .on("mousemove", function(ev,d){
          const [px,py] = d3.pointer(ev, host.node());
          // 光标垂直辅助线
          gHotzone.selectAll("line.cursor").remove();
          gHotzone.append("line").attr("class","cursor")
            .attr("x1", x(d.x)+x.bandwidth()/2).attr("x2", x(d.x)+x.bandwidth()/2)
            .attr("y1", 0).attr("y2", innerH).attr("stroke","rgba(0,0,0,0.6)").attr("stroke-width",1);
          tt.show(`
            <div class="tt-title">${d.x}</div>
            <div class="tt-row"><span class="tt-dot" style="background:${COMBO_BAR[0]}"></span><span class="nm">营收</span><span class="vl">${d.rev}</span></div>
            <div class="tt-row"><span class="tt-dot" style="background:${COMBO_BAR[1]}"></span><span class="nm">成本</span><span class="vl">${d.cost}</span></div>
            <div class="tt-row"><span class="tt-dot" style="background:${COMBO_LINE[0]}"></span><span class="nm">同比</span><span class="vl">${d.yoy}%</span></div>
            <div class="tt-row"><span class="tt-dot" style="background:${COMBO_LINE[1]}"></span><span class="nm">预测</span><span class="vl">${d.fcst}%</span></div>
          `, px, py);
        })
        .on("mouseleave", ()=>{ tt.hide(); gHotzone.selectAll("line.cursor").remove(); });
  }
  draw();

  // 水印（左下）
  watermark(svg, margin.left, H-26);

  /* DataZoom §1.13 — 4px 细轨 + 32×32 全圆把手 + 边缘对齐 + showDataShadow:false */
  const dzWrap = host.append("div").attr("class","dz")
    .style("width", innerW + "px")
    .style("margin-left", margin.left + "px");
  dzWrap.append("div").attr("class","track");
  const fill = dzWrap.append("div").attr("class","fill");
  const hL = dzWrap.append("div").attr("class","handle hL"); hL.append("div").attr("class","grip").html("<i></i><i></i><i></i>");
  const hR = dzWrap.append("div").attr("class","handle hR"); hR.append("div").attr("class","grip").html("<i></i><i></i><i></i>");

  let trackW = 0;
  function updateDz(){
    trackW = dzWrap.node().getBoundingClientRect().width;
    const usableW = trackW - 32;
    const xL = (lo / N) * usableW;
    const xR = (hi / N) * usableW + 32;
    hL.style("left", xL + "px");
    hR.style("left", (xR - 32) + "px");
    fill.style("left", (xL + 16) + "px").style("width", Math.max(0, xR - xL - 32) + "px");
    draw();
  }
  function bindDrag(handle, isLeft){
    handle.on("mousedown", ev=>{
      ev.preventDefault();
      const rect = dzWrap.node().getBoundingClientRect();
      function mv(e){
        const usable = rect.width - 32;
        const rel = e.clientX - rect.left - 16;
        let idx = Math.round((rel / usable) * N);
        if(isLeft) lo = Math.max(0, Math.min(hi-2, idx));
        else       hi = Math.min(N, Math.max(lo+2, idx));
        updateDz();
      }
      function up(){ window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); }
      window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
    });
  }
  bindDrag(hL, true); bindDrag(hR, false);
  requestAnimationFrame(updateDz);
  window.addEventListener("resize", updateDz);
}

/* ====================== 2. Pie ====================== */
function renderPie(host, isMobile){
  const W = isMobile ? 319 : 760, H = 280;
  const svg = svgBase(host, W, H, isMobile);

  // 饼图位置（左侧），图例位置（右侧）
  const cx = isMobile ? 110 : 200;
  const cy = H/2 - 6;
  const R = isMobile ? 70 : 90;

  const sorted = [...D_PIE]; // 不重排，保色板顺序与图例一致
  const pieGen = d3.pie().value(d=>d.v).sort(null).padAngle(0);
  const arcs = pieGen(sorted);
  const arc = d3.arc().innerRadius(0).outerRadius(R);
  const arcOuter = d3.arc().innerRadius(R+8).outerRadius(R+8);

  const tt = tooltip(host);
  const g = svg.append("g").attr("transform",`translate(${cx},${cy})`);
  const slices = g.selectAll("path.slice").data(arcs).enter().append("path")
    .attr("class","slice")
    .attr("d", arc)
    .attr("fill", (d,i)=> PIE_PAL[i % PIE_PAL.length])
    .on("mousemove", function(ev,d){
      const [px,py] = d3.pointer(ev, host.node());
      tt.show(`
        <div class="tt-title">${d.data.name}</div>
        <div class="tt-row"><span class="tt-dot" style="background:${PIE_PAL[d.index]}"></span><span class="nm">占比</span><span class="vl">${d.data.v}%</span></div>
      `, px, py);
      const aMid = (d.startAngle+d.endAngle)/2 - Math.PI/2;
      d3.select(this).attr("transform", `translate(${Math.cos(aMid)*4},${Math.sin(aMid)*4})`);
    })
    .on("mouseleave", function(){ tt.hide(); d3.select(this).attr("transform",""); });

  // 引线 + 标签（§饼图：必有引线、+8px 间距、引线跟随扇区色）
  const labels = g.append("g");
  arcs.forEach((d,i)=>{
    const a = (d.startAngle + d.endAngle)/2 - Math.PI/2;
    const p0 = [Math.cos(a)*R,       Math.sin(a)*R];
    const p1 = [Math.cos(a)*(R+10),  Math.sin(a)*(R+10)];
    const p2 = [Math.cos(a)*(R+24)+ (Math.cos(a)>0?6:-6), Math.sin(a)*(R+24)];
    const color = PIE_PAL[i % PIE_PAL.length];
    labels.append("polyline")
      .attr("points", [p0,p1,p2].map(p=>p.join(",")).join(" "))
      .attr("fill","none").attr("stroke", color).attr("stroke-width",1);
    labels.append("text")
      .attr("class","label-num")
      .attr("x", p2[0] + (Math.cos(a)>0 ? 4 : -4))
      .attr("y", p2[1] + 3)
      .attr("text-anchor", Math.cos(a)>0 ? "start" : "end")
      .attr("fill", "var(--text-primary)")
      .text(`${d.data.name} ${d.data.v}%`);
  });

  // 中心总计标签（可选）
  g.append("text").attr("text-anchor","middle").attr("y", -4)
    .attr("font-size", 11).attr("fill","var(--text-secondary)").text("S&P500 行业权重");
  g.append("text").attr("text-anchor","middle").attr("y", 14)
    .attr("font-size", 18).attr("font-weight",700).attr("fill","#265FFC").text("100%");

  // 右侧图例
  const lgX = isMobile ? 220 : 460;
  const lgY = 40;
  D_PIE.forEach((d,i)=>{
    svg.append("circle").attr("cx", lgX).attr("cy", lgY + i*22).attr("r",5).attr("fill", PIE_PAL[i]);
    svg.append("text").attr("class","axis-label")
      .attr("x", lgX + 12).attr("y", lgY + i*22 + 4)
      .attr("fill","var(--text-primary)").text(d.name);
    svg.append("text").attr("class","axis-label")
      .attr("x", isMobile? W-12 : W-60).attr("y", lgY + i*22 + 4)
      .attr("text-anchor","end")
      .attr("font-weight",600).attr("fill","var(--text-primary)").text(d.v + "%");
  });

  watermark(svg, 14, H-26);
}

/* ====================== 3. Grouped Bar (含负) ====================== */
function renderGrouped(host, isMobile){
  const W = isMobile ? 319 : 760, H = 280;
  const margin = {top:32, right:48, bottom:30, left: isMobile? 8 : 48};
  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;

  // legend
  const lg = host.insert("div","svg").attr("class","lg");
  const visible = SERIES_G.map(()=> true);
  SERIES_G.forEach((s,i)=>{
    const it = lg.append("span").attr("class","lg-item").on("click", function(){
      visible[i] = !visible[i];
      d3.select(this).classed("off", !visible[i]);
      draw();
    });
    it.append("i").attr("class","lg-dot").style("background", s.color);
    it.append("span").text(s.key);
  });

  const svg = svgBase(host, W, H, isMobile);
  const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);
  const tt = tooltip(host);

  const x0 = d3.scaleBand().domain(D_GBAR.map(d=>d.x)).range([0, innerW]).padding(0.28);
  // Ainvest §1.15: 组内单柱宽 = 66 / N，barGap 5%
  const N = SERIES_G.length;
  const innerBarW = Math.min(66/N, Math.min(32, (x0.bandwidth() - (N-1)*3) / N));
  const innerGap  = innerBarW * 0.05; // §1.15 barGap 5%

  const allVals = D_GBAR.flatMap(d => SERIES_G.map(s => d[s.key]));
  const ext = d3.extent(allVals);
  const ns = niceScale(Math.min(0, ext[0])*1.15, ext[1]*1.15);
  const y = d3.scaleLinear().domain([ns.min, ns.max]).range([innerH, 0]);

  // grid
  g.selectAll("line.grid").data(ns.ticks).enter().append("line")
    .attr("class", d=> d===0 ? "zero-line" : "grid-line")
    .attr("x1",0).attr("x2",innerW)
    .attr("y1", d=>y(d)).attr("y2", d=>y(d));

  // axis line
  g.append("line").attr("class","axis-line")
    .attr("x1",0).attr("x2",innerW).attr("y1",y(0)).attr("y2",y(0))
    .attr("stroke-opacity", ns.min<0 ? 0 : 1); // 0 已由 zero-line 表达
  g.append("line").attr("class","axis-line")
    .attr("x1",0).attr("x2",innerW).attr("y1",innerH).attr("y2",innerH);

  // Y 标签
  const gAxisY = g.append("g");
  ns.ticks.forEach(t=>{
    gAxisY.append("text").attr("class","axis-label")
      .attr("x", isMobile? 4 : -8)
      .attr("y", y(t)+(isMobile? -3 : 4))
      .attr("text-anchor", isMobile? "start":"end")
      .text(t);
  });

  // X 标签
  const gAxisX = g.append("g");
  D_GBAR.forEach(d=>{
    gAxisX.append("text").attr("class","axis-label")
      .attr("x", x0(d.x) + x0.bandwidth()/2).attr("y", innerH + 16)
      .attr("text-anchor","middle").text(d.x);
  });

  const gBars = g.append("g");
  const gHot  = g.append("g");

  function draw(){
    // 重新计算可见序列的位置
    const vis = SERIES_G.filter((_,i)=> visible[i]);
    const VN = Math.max(1, vis.length);
    const groupBars = D_GBAR.map(d=>{
      const bars = vis.map((s,vi)=>{
        const cx = x0(d.x) + x0.bandwidth()/2;
        const totalW = innerBarW*VN + innerGap*(VN-1);
        const left = cx - totalW/2 + vi*(innerBarW + innerGap);
        const v = d[s.key];
        return {x:d.x, name:s.key, color:s.color, v, left, w:innerBarW};
      });
      return {x:d.x, bars};
    });

    const gs = gBars.selectAll("g.group").data(groupBars, d=>d.x);
    gs.exit().remove();
    const gsEnter = gs.enter().append("g").attr("class","group");
    const gsMerged = gsEnter.merge(gs);

    const bs = gsMerged.selectAll("rect.b").data(d=>d.bars, b=>b.name);
    bs.exit().remove();
    const bsEnter = bs.enter().append("rect").attr("class","b");
    bsEnter.merge(bs)
      .attr("x", b=> b.left)
      .attr("width", b=> b.w)
      .attr("y", b=> b.v>=0 ? y(b.v) : y(0))
      .attr("height", b=> Math.abs(y(b.v) - y(0)))
      .attr("fill", b=> b.color);

    // 数据标签（Ainvest 柱标签固定 rgba(0,0,0,.6) §1.15），仅在数值有空间时显示
    const labs = gsMerged.selectAll("text.lab").data(d=>d.bars, b=>b.name);
    labs.exit().remove();
    const labsEnter = labs.enter().append("text").attr("class","lab");
    labsEnter.merge(labs)
      .attr("x", b=> b.left + b.w/2)
      .attr("y", b=> b.v>=0 ? y(b.v)-4 : y(b.v)+10)
      .attr("text-anchor","middle")
      .attr("font-size", 9).attr("font-weight",500)
      .attr("fill","rgba(0,0,0,0.6)")
      .text(b=> Math.abs(b.v) >= 10 ? b.v : "");

    // 热区
    const hot = gHot.selectAll("rect.hot").data(D_GBAR, d=>d.x);
    hot.exit().remove();
    hot.enter().append("rect").attr("class","hot").attr("fill","transparent")
      .merge(hot)
        .attr("x", d=> x0(d.x)).attr("width", x0.bandwidth())
        .attr("y", 0).attr("height", innerH)
        .on("mousemove", function(ev,d){
          const [px,py] = d3.pointer(ev, host.node());
          const rows = vis.map(s=>{
            return `<div class="tt-row">
              <span class="tt-dot" style="background:${s.color}"></span>
              <span class="nm">${s.key}</span>
              <span class="vl">${d[s.key]}</span>
            </div>`;
          }).join("");
          tt.show(`<div class="tt-title">${d.x}</div>${rows}`, px, py);
        })
        .on("mouseleave", tt.hide);
  }
  draw();

  watermark(svg, margin.left, H-26);
}
